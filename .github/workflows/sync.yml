name: Prospero Sync
on:
  workflow_dispatch:
    inputs:
      tickers:
        description: 'Enter symbols (e.g., AAPL NVDA TSLA)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libs
        run: pip install pandas yfinance

      - name: Run Tracker
        env:
          PROSPERO_LIST: ${{ github.event.inputs.tickers }}
        run: |
          python prospero_tracker.py
          echo "### 📈 Prospero Signal Dashboard" > README.md
          echo "Last Updated: $(date -u) UTC" >> README.md
          echo "" >> README.md
          echo "| Ticker | Current | Gain % | Date In | Price In | Status | Days |" >> README.md
          echo "| :--- | :--- | :--- | :--- | :--- | :--- | :--- |" >> README.md
          
          # awk command updated for new column mapping:
          # $1=Ticker, $2=Current, $3=Gain%, $4=Date_In, $5=Price_In, $8=Status, $9=Days
          tail -n +2 signals.csv | awk -F, '{print "| **" $1 "** | $" $2 " | " $3 " | " $4 " | $" $5 " | " $8 " | " $9 " |"}' >> README.md

      - name: Save Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add signals.csv README.md
          git commit -m "Sync: ${{ github.event.inputs.tickers }}" || exit 0
          git push

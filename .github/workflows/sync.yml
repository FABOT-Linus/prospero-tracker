- name: Run Tracker
        env:
          PROSPERO_LIST: ${{ github.event.inputs.tickers }}
        run: |
          python prospero_tracker.py
          
          # Create headers for README
          echo "### 📈 Prospero Active Signals" > README.md
          echo "Last Updated (Toronto): $(TZ='America/Toronto' date +'%Y-%m-%d %H:%M %Z')" >> README.md
          echo "" >> README.md
          echo "| Ticker | Total Gain | Current Price | Price In | Today's Gain | Date In | Days Held |" >> README.md
          echo "| :--- | :--- | :--- | :--- | :--- | :--- | :--- |" >> README.md
          
          # Create headers for Email
          echo "<html><body><h3>📈 Prospero Signal Report</h3><p>Last Updated: $(TZ='America/Toronto' date +'%Y-%m-%d %H:%M')</p><table border='1' style='border-collapse: collapse; width: 100%; font-family: sans-serif;'><tr style='background-color: #f2f2f2;'><th>Ticker</th><th>Total Gain</th><th>Current Price</th><th>Price In</th><th>Today's Gain</th><th>Date In</th><th>Days Held</th></tr>" > email.html

          # Process CSV - Active Rows
          if [ -f signals.csv ]; then
            while IFS=, read -r ticker current total tdate today date_in price_in days status d_out p_out; do
              if [ "$status" == "Active" ]; then
                # Reordered: Ticker ($1), Total ($3), Current ($2), Price In ($7), Today ($5), Date In ($6), Days ($8)
                echo "| **$ticker** | $total | \$$current | \$$price_in | $today | $date_in | $days |" >> README.md
                echo "<tr><td><b>$ticker</b></td><td>$total</td><td>\$$current</td><td>\$$price_in</td><td>$today</td><td>$date_in</td><td>$days</td></tr>" >> email.html
              fi
            done < <(tail -n +2 signals.csv)
          fi

          # Exit History Section (Keeping this the same as it's a historical log)
          echo "" >> README.md
          echo "### 🏁 Exit History" >> README.md
          echo "| Ticker | Exit Date | Date In | Days Held | Price In | Price Out | Total Profit |" >> README.md
          echo "| :--- | :--- | :--- | :--- | :--- | :--- | :--- |" >> README.md
          echo "</table><br><h3>🏁 Exit History</h3><table border='1' style='border-collapse: collapse; width: 100%; font-family: sans-serif;'><tr style='background-color: #f2f2f2;'><th>Ticker</th><th>Exit Date</th><th>Date In</th><th>Days Held</th><th>Price In</th><th>Price Out</th><th>Total Profit</th></tr>" >> email.html
          
          if [ -f signals.csv ]; then
            while IFS=, read -r ticker current total tdate today date_in price_in days status d_out p_out; do
              if [ "$status" == "Closed" ]; then
                echo "| $ticker | $d_out | $date_in | $days | \$$price_in | \$$p_out | $total |" >> README.md
                echo "<tr><td>$ticker</td><td>$d_out</td><td>$date_in</td><td>$days</td><td>\$$price_in</td><td>\$$p_out</td><td>$total</td></tr>" >> email.html
              fi
            done < <(tail -n +2 signals.csv)
          fi
          echo "</table></body></html>" >> email.html

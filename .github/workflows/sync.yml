name: Prospero Sync
on:
  workflow_dispatch:
    inputs:
      tickers:
        description: 'Tickers'
        required: false
        default: ''
  schedule:
    - cron: '42 13-20 * * 1-5'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install pandas yfinance pytz

      - name: Run Tracker
        env:
          PROSPERO_LIST: ${{ github.event.inputs.tickers }}
        run: |
          python prospero_tracker.py
          
          # BUILD THE INTERACTIVE DASHBOARD
          echo "<html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'>
          <title>Prospero Control</title>
          <style>
            body { font-family: -apple-system, sans-serif; background: #f4f7f6; padding: 20px; text-align: center; }
            .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
            input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 10px; font-size: 18px; margin-bottom: 15px; box-sizing: border-box; }
            .btn { width: 48%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; font-size: 16px; }
            .add { background: #28a745; } .exit { background: #dc3545; }
            table { width: 100%; margin-top: 25px; border-collapse: collapse; }
            td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
            .pos { color: #28a745; font-weight: bold; } .neg { color: #dc3545; font-weight: bold; }
          </style>
          <script>
            async function sendSignal(action) {
              const t = document.getElementById('ticker').value.toUpperCase();
              if(!t) return alert('Enter ticker');
              const val = action === 'add' ? t : '-' + t;
              const ok = confirm('Sync ' + val + '?');
              if(!ok) return;
              
              const res = await fetch('https://api.github.com/repos/${{ github.repository }}/actions/workflows/sync.yml/dispatches', {
                method: 'POST',
                headers: { 'Authorization': 'token ${{ secrets.DASHBOARD_PAT }}', 'Accept': 'application/vnd.github.v3+json' },
                body: JSON.stringify({ ref: 'main', inputs: { tickers: val } })
              });
              if(res.ok) { alert('Updating... check back in 1 min'); location.reload(); }
              else { alert('Failed. Check PAT Secret.'); }
            }
          </script>
          </head><body><div class='card'>
          <h2>🎮 Prospero App</h2>
          <input type='text' id='ticker' placeholder='e.g. NVDA'>
          <button class='btn add' onclick='sendSignal(\"add\")'>BUY / UPDATE</button>
          <button class='btn exit' onclick='sendSignal(\"exit\")'>EXIT POSITION</button>
          <table>" > index.html

          if [ -f signals.csv ]; then
            while IFS=, read -r ticker current total tdate today date_in price_in days status d_out p_out; do
              if [ "$status" == "Active" ]; then
                cls="pos"; if [[ "$total" == *"🔴"* ]]; then cls="neg"; fi
                echo "<tr><td><b>$ticker</b></td><td class='\$cls'>$total</td><td>\$$current</td></tr>" >> index.html
              fi
            done < <(tail -n +2 signals.csv)
          fi
          echo "</table><p style='font-size:10px; color:#ccc; margin-top:20px;'>Last Update: $(date)</p></div></body></html>" >> index.html

      - name: Save Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add signals.csv index.html
          git commit -m "Update Dashboard [Skip CI]" || exit 0
          git push

- name: Run Tracker
        env:
          PROSPERO_LIST: ${{ github.event.inputs.tickers }}
        run: |
          python prospero_tracker.py
          
          # Create the Dashboard (index.html)
          echo "<html><head>
          <meta http-equiv='refresh' content='60'>
          <title>Prospero Live Dashboard</title>
          <style>
            body { font-family: -apple-system, sans-serif; background: #f4f7f6; color: #333; padding: 20px; }
            .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 1000px; margin: auto; }
            table { width: 100%; border-collapse: collapse; margin-top: 20px; }
            th { text-align: left; background: #f8f9fa; padding: 12px; border-bottom: 2px solid #eee; }
            td { padding: 12px; border-bottom: 1px solid #eee; }
            .ticker { font-weight: bold; color: #007aff; }
            .positive { color: #28a745; font-weight: bold; }
            .negative { color: #dc3545; font-weight: bold; }
            .footer { font-size: 12px; color: #888; margin-top: 20px; text-align: center; }
          </style>
          </head><body><div class='card'>
          <h2>📈 Prospero Live Signals</h2>
          <table><tr><th>Ticker</th><th>Total Gain</th><th>Current Price</th><th>Price In</th><th>Today's Gain</th><th>Date In</th><th>Days</th></tr>" > index.html

          if [ -f signals.csv ]; then
            while IFS=, read -r ticker current total tdate today date_in price_in days status d_out p_out; do
              if [ "$status" == "Active" ]; then
                # Use logic to color text based on emojis
                color_class="positive"
                if [[ "$total" == *"🔴"* ]]; then color_class="negative"; fi
                
                echo "<tr><td class='ticker'>$ticker</td><td class='$color_class'>$total</td><td>\$$current</td><td>\$$price_in</td><td>$today</td><td>$date_in</td><td>$days</td></tr>" >> index.html
              fi
            done < <(tail -n +2 signals.csv)
          fi

          echo "</table><div class='footer'>Last Updated: $(TZ='America/Toronto' date +'%Y-%m-%d %H:%M') Toronto Time<br>Page auto-refreshes every 60s</div></div></body></html>" >> index.html
- name: Save Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # We added 'index.html' to the list below so it gets saved!
          git add signals.csv README.md index.html
          git commit -m "Update Dashboard [Skip CI]" || exit 0
          git push

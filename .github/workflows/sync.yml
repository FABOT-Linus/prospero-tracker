- name: Run Tracker
        env:
          PROSPERO_LIST: ${{ github.event.inputs.tickers }}
          # We need these for the JS trigger to work
          GH_TOKEN: ${{ secrets.DASHBOARD_PAT }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          python prospero_tracker.py
          
          # Create the Interactive Dashboard
          echo "<html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'>
          <title>Prospero Control</title>
          <style>
            body { font-family: -apple-system, sans-serif; background: #f4f7f6; padding: 20px; }
            .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 800px; margin: auto; }
            .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
            input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
            button { padding: 12px 20px; background: #007aff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
            table { width: 100%; border-collapse: collapse; }
            th { text-align: left; background: #f8f9fa; padding: 12px; border-bottom: 2px solid #eee; }
            td { padding: 12px; border-bottom: 1px solid #eee; }
            .positive { color: #28a745; font-weight: bold; }
            .negative { color: #dc3545; font-weight: bold; }
          </style>
          <script>
            async function triggerSync(actionType) {
              const ticker = document.getElementById('tickerInput').value.trim().toUpperCase();
              if (!ticker) return alert('Enter a ticker');
              
              const payload = actionType === 'add' ? ticker : '-' + ticker;
              const btn = document.getElementById(actionType + 'Btn');
              btn.innerText = 'Syncing...';
              
              // Trigger GitHub Action via API
              const response = await fetch('https://api.github.com/repos/${{ github.repository }}/actions/workflows/sync.yml/dispatches', {
                method: 'POST',
                headers: {
                  'Authorization': 'Bearer ${{ secrets.DASHBOARD_PAT }}',
                  'Accept': 'application/vnd.github.v3+json'
                },
                body: JSON.stringify({ ref: 'main', inputs: { tickers: payload } })
              });

              if (response.ok) {
                alert('Success! Dashboard will update in ~60 seconds.');
                location.reload();
              } else {
                alert('Error triggering sync. Check your PAT token.');
              }
            }
          </script>
          </head><body><div class='card'>
          <h2>🎮 Prospero Control Center</h2>
          <div class='input-group'>
            <input type='text' id='tickerInput' placeholder='Ticker (e.g. NVDA)'>
            <button id='addBtn' onclick=\"triggerSync('add')\">Add/Update</button>
            <button id='removeBtn' onclick=\"triggerSync('remove')\" style='background:#ff3b30;'>Exit</button>
          </div>
          <table><tr><th>Ticker</th><th>Total Gain</th><th>Current Price</th><th>Today</th></tr>" > index.html

          if [ -f signals.csv ]; then
            while IFS=, read -r ticker current total tdate today date_in price_in days status d_out p_out; do
              if [ "$status" == "Active" ]; then
                color_class="positive"; if [[ "$total" == *"🔴"* ]]; then color_class="negative"; fi
                echo "<tr><td><b>$ticker</b></td><td class='$color_class'>$total</td><td>\$$current</td><td>$today</td></tr>" >> index.html
              fi
            done < <(tail -n +2 signals.csv)
          fi
          echo "</table><p style='text-align:center; font-size:12px; color:#999; margin-top:20px;'>Last Sync: $(date)</p></div></body></html>" >> index.html

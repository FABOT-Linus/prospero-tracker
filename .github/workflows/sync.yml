name: Prospero Sync
on:
  workflow_dispatch:
    inputs:
      tickers:
        description: 'Enter tickers (e.g., AAPL NVDA)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libs
        run: pip install pandas yfinance

      - name: Run Tracker
        env:
          PROSPERO_LIST: ${{ github.event.inputs.tickers }}
        run: python prospero_tracker.py

      - name: Save Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add signals.csv
          git commit -m "Updated signals" || exit 0
          git push

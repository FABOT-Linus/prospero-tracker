name: Prospero Sync
on:
  workflow_dispatch:
    inputs:
      tickers:
        description: 'Enter symbols (e.g., AAPL NVDA TSLA)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libs
        run: |
          pip install pandas yfinance

      - name: Run Tracker
        env:
          PROSPERO_LIST: ${{ github.event.inputs.tickers }}
        run: |
          # 1. Execute the Python script to update the CSV
          python prospero_tracker.py
          
          # 2. Re-generate the Dashboard for the README
          echo "### 📈 Prospero Signal Dashboard" > README.md
          echo "Last Updated: $(date -u) UTC" >> README.md
          echo "" >> README.md
          echo "| Ticker | In (Open) | Current | Status | Days | Gain/Loss |" >> README.md
          echo "| :--- | :--- | :--- | :--- | :--- | :--- |" >> README.md
          
          # This line reads the CSV and formats the rows for the Markdown table
          # It skips the header and handles the 9 columns of our new CSV structure
          tail -n +2 signals.csv | awk -F, '{print "| " $1 " | $" $3 " | $" $4 " | " $7 " | " $8 " | " $9 " |"}' >> README.md

      - name: Save Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add signals.csv README.md
          git commit -m "Sync: ${{ github.event.inputs.tickers }}" || exit 0
          git push

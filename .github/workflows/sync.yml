- name: Run Tracker
        env:
          PROSPERO_LIST: ${{ github.event.inputs.tickers }}
        run: |
          python prospero_tracker.py
          
          # 1. Create the standard README for GitHub
          echo "### 📈 Prospero Active Signals" > README.md
          echo "Last Updated (Toronto): $(TZ='America/Toronto' date +'%Y-%m-%d %H:%M %Z')" >> README.md
          echo "" >> README.md
          echo "| Ticker | Current | Gain/Loss | Today's Date | Today | Date In | Price In | Days |" >> README.md
          echo "| :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |" >> README.md
          
          tail -n +2 signals.csv | while IFS=, read -r ticker current total tdate today date_in price_in days status d_out p_out; do
            if [ "$status" == "Active" ]; then
              echo "| **$ticker** | \$$current | $total | $tdate | $today | $date_in | \$$price_in | $days |" >> README.md
            fi
          done

          # 2. Create a clean HTML version for the Email
          echo "<html><body><h3>📈 Prospero Signal Report</h3>" > email.html
          echo "<p>Last Updated (Toronto): $(TZ='America/Toronto' date +'%Y-%m-%d %H:%M %Z')</p>" >> email.html
          echo "<table border='1' style='border-collapse: collapse; width: 100%; font-family: sans-serif;'>" >> email.html
          echo "<tr style='background-color: #f2f2f2;'><th>Ticker</th><th>Price</th><th>Total Gain</th><th>Date</th><th>Today</th><th>In Date</th><th>In Price</th><th>Days</th></tr>" >> email.html
          
          tail -n +2 signals.csv | while IFS=, read -r ticker current total tdate today date_in price_in days status d_out p_out; do
            if [ "$status" == "Active" ]; then
              echo "<tr><td>$ticker</td><td>\$$current</td><td>$total</td><td>$tdate</td><td>$today</td><td>$date_in</td><td>\$$price_in</td><td>$days</td></tr>" >> email.html
            fi
          done
          echo "</table></body></html>" >> email.html

      - name: Save Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add signals.csv README.md
          git commit -m "Automated Market Sync [Skip CI]" || exit 0
          git push

      - name: Send Email Report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: Prospero Signal Report - $(date +'%Y-%m-%d')
          to: linus.chen1984@gmail.com
          from: Prospero Tracker <linus.chen1984@gmail.com>
          # We tell it to use the new HTML file we just created
          html_body: file://email.html

name: Prospero Sync
on:
  workflow_dispatch:
    inputs:
      tickers:
        description: 'Enter symbols (e.g., AAPL NVDA TSLA)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libs
        run: pip install pandas yfinance

      - name: Run Tracker
        env:
          PROSPERO_LIST: ${{ github.event.inputs.tickers }}
        run: |
          python prospero_tracker.py
          
          echo "### 📈 Prospero Signal Dashboard" > README.md
          echo "Last Updated: $(TZ='America/Toronto' date +'%Y-%m-%d %H:%M %Z')" >> README.md
          echo "" >> README.md
          echo "| Ticker | Current | Gain/Loss | Date In | Price In (Open) | Days |" >> README.md
          echo "| :--- | :--- | :--- | :--- | :--- | :--- |" >> README.md
          
          # Reading CSV columns: 1=Ticker, 2=Current, 3=Gain, 4=DateIn, 5=PriceIn, 6=Days, 7=Status
          tail -n +2 signals.csv | while IFS=, read -r ticker current gain date_in price_in days status; do
            if [ "$status" == "Active" ]; then
              echo "| **$ticker** | \$$current | $gain | $date_in | \$$price_in | $days |" >> README.md
            fi
          done

      - name: Save Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add signals.csv README.md
          git commit -m "Fix Gain Calculation" || exit 0
          git push

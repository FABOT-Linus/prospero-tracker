name: Prospero Sync
on:
  schedule:
    - cron: '0 14,16,18,20 * * 1-5'
  workflow_dispatch:
    inputs:
      tickers:
        description: 'Enter symbols or leave blank'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libs
        run: pip install pandas yfinance

      - name: Run Tracker
        env:
          PROSPERO_LIST: ${{ github.event.inputs.tickers }}
        run: |
          python prospero_tracker.py
          
          # 1. Generate README (GitHub View)
          echo "### 📈 Prospero Active Signals" > README.md
          echo "Last Updated (Toronto): $(TZ='America/Toronto' date +'%Y-%m-%d %H:%M %Z')" >> README.md
          echo "" >> README.md
          echo "| Ticker | Current | Gain/Loss | Today's Date | Today | Date In | Price In | Days |" >> README.md
          echo "| :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |" >> README.md
          
          # 2. Start Email HTML
          echo "<html><body><h3>📈 Prospero Signal Report</h3><p>Last Updated: $(TZ='America/Toronto' date +'%Y-%m-%d %H:%M')</p><table border='1' style='border-collapse: collapse; width: 100%; font-family: sans-serif;'><tr style='background-color: #f2f2f2;'><th>Ticker</th><th>Price</th><th>Total Gain</th><th>Today</th><th>In Date</th><th>In Price</th><th>Days</th></tr>" > email.html

          # 3. Read CSV and populate both README and Email
          # We use -F, to strictly define the comma as the separator
          while IFS=, read -r ticker current total tdate today date_in price_in days status d_out p_out; do
            if [ "$status" == "Active" ]; then
              # Append to README
              echo "| **$ticker** | \$$current | $total | $tdate | $today | $date_in | \$$price_in | $days |" >> README.md
              # Append to Email
              echo "<tr><td><b>$ticker</b></td><td>\$$current</td><td>$total</td><td>$today</td><td>$date_in</td><td>\$$price_in</td><td>$days</td></tr>" >> email.html
            fi
          done < <(tail -n +2 signals.csv)

          echo "</table><br><h3>🏁 Exit History</h3>" >> email.html
          echo "<table border='1' style='border-collapse: collapse; width: 100%; font-family: sans-serif;'><tr style='background-color: #f2f2f2;'><th>Ticker</th><th>Exit Date</th><th>Exit Price</th><th>Total Performance</th></tr>" >> email.html
          
          # 4. Populate Exit History
          while IFS=, read -r ticker current total tdate today date_in price_in days status d_out p_out; do
            if [ "$status" == "Closed" ]; then
              echo "<tr><td>$ticker</td><td>$d_out</td><td>\$$p_out</td><td>$total</td></tr>" >> email.html
            fi
          done < <(tail -n +2 signals.csv)
          
          echo "</table></body></html>" >> email.html

      - name: Save Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add signals.csv README.md
          git commit -m "Automated Market Sync [Skip CI]" || exit 0
          git push

      - name: Send Email Report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: Prospero Signal Report - $(date +'%Y-%m-%d')
          to: linus.chen1984@gmail.com
          from: Prospero Tracker <linus.chen1984@gmail.com>
          html_body: file://email.html

name: Prospero Sync
on:
  # Automated schedule: 10am, 12pm, 2pm, 4pm ET (Monday-Friday)
  # 14, 16, 18, 20 UTC = 10, 12, 2, 4 ET
  schedule:
    - cron: '0 14,16,18,20 * * 1-5'
  workflow_dispatch:
    inputs:
      tickers:
        description: 'Enter symbols (e.g., AAPL NVDA TSLA) or leave blank to use current active list'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libs
        run: pip install pandas yfinance

      - name: Run Tracker
        env:
          PROSPERO_LIST: ${{ github.event.inputs.tickers }}
        run: |
          python prospero_tracker.py
          
          # Dashboard Header
          echo "### 📈 Prospero Active Signals" > README.md
          echo "Last Updated (Toronto): $(TZ='America/Toronto' date +'%Y-%m-%d %H:%M %Z')" >> README.md
          echo "" >> README.md
          echo "| Ticker | Current | Gain/Loss | Today's Date | Today | Date In | Price In | Days |" >> README.md
          echo "| :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |" >> README.md
          
          # Reading Active Tickers from CSV
          # Columns: 1=Ticker, 2=Current, 3=TotalGain, 4=TodayDate, 5=TodayGain, 6=DateIn, 7=PriceIn, 8=Days, 9=Status, 10=DateOut, 11=PriceOut
          tail -n +2 signals.csv | while IFS=, read -r ticker current total tdate today date_in price_in days status d_out p_out; do
            if [ "$status" == "Active" ]; then
              echo "| **$ticker** | \$$current | $total | $tdate | $today | $date_in | \$$price_in | $days |" >> README.md
            fi
          done

          echo "" >> README.md
          echo "### 🏁 Exit History" >> README.md
          echo "| Ticker | Exit Date | Exit Price | Total Performance |" >> README.md
          echo "| :--- | :--- | :--- | :--- |" >> README.md

          # Reading Closed Tickers from CSV
          tail -n +2 signals.csv | while IFS=, read -r ticker current total tdate today date_in price_in days status d_out p_out; do
            if [ "$status" == "Closed" ]; then
              echo "| $ticker | $d_out | \$$p_out | $total |" >> README.md
            fi
          done

      - name: Save Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add signals.csv README.md
          git commit -m "Automated Market Sync [Skip CI]" || exit 0
          git push

      - name: Send Email Report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: Prospero Signal Report - $(date +'%Y-%m-%d')
          to: linus.chen1984@gmail.com
          from: Prospero Tracker
          body: file://README.md
          convert_markdown: true

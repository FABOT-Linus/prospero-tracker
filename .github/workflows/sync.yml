name: Prospero Sync
on:
  workflow_dispatch:
    inputs:
      tickers:
        description: 'Enter symbols (e.g., AAPL NVDA TSLA)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libs
        run: pip install pandas yfinance

      - name: Run Tracker
        env:
          PROSPERO_LIST: ${{ github.event.inputs.tickers }}
        run: |
          python prospero_tracker.py
          echo "### 📈 Prospero Signal Dashboard" > README.md
          echo "Last Updated (EST): $(TZ='America/Toronto' date) " >> README.md
          echo "" >> README.md
          echo "| Ticker | Current | Gain % | Date In | Price In (Open) | Status | Days |" >> README.md
          echo "| :--- | :--- | :--- | :--- | :--- | :--- | :--- |" >> README.md
          
          # This loop reads the CSV properly and populates the README
          tail -n +2 signals.csv | while IFS=, read -r ticker current gain date_in price_in d_out p_out status days; do
            echo "| **$ticker** | \$$current | $gain | $date_in | \$$price_in | $status | $days |" >> README.md
          done

      - name: Save Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add signals.csv README.md
          git commit -m "Sync: ${{ github.event.inputs.tickers }}" || exit 0
          git push

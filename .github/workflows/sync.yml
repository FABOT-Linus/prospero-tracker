name: Prospero Sync
on:
  workflow_dispatch:
    inputs:
      tickers:
        description: 'Tickers (e.g. AAPL NVDA)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libs
        run: pip install pandas yfinance

      - name: Run Tracker
        env:
          PROSPERO_LIST: ${{ github.event.inputs.tickers }}
        run: |
          python prospero_tracker.py
          # Generate the Dashboard in README.md
          echo "### 📈 Prospero Signal Dashboard" > README.md
          echo "| Ticker | Status | Days | Live Gain/Loss |" >> README.md
          echo "| :--- | :--- | :--- | :--- |" >> README.md
          # Reads the CSV and turns it into Markdown table rows
          tail -n +2 signals.csv | awk -F, '{print "| " $1 " | " $6 " | " $7 " | " $8 " |"}' >> README.md

      - name: Save Changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add signals.csv README.md
          git commit -m "Update Dashboard: ${{ github.event.inputs.tickers }}" || exit 0
          git push
